# This is deliberately the V3 preview's separate-site configuration. It is not
# used by the V2 Netlify site and must retain its independent site ID/rollback.
[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://tiles.openfreemap.org; img-src 'self' data: blob: https://tiles.openfreemap.org; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self' blob:; child-src 'self' blob:; frame-src https://mapgap-access.netlify.app; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
