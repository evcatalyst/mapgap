apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mapgap-valhalla
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 10
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/mapgap-valhalla:TAG
          ports:
            - name: http1
              containerPort: 8082
          env:
            # Set VALHALLA_SHARED_SECRET in the Cloud Run UI or Secret Manager.
            # It must match the Netlify VALHALLA_SHARED_SECRET value.
            - name: tile_urls
              value: "https://download.geofabrik.de/north-america/us/new-york-latest.osm.pbf"
            - name: MAPGAP_PREBUILT_TILES
              value: "True"
            - name: MAPGAP_ENABLE_PROXY
              value: "True"
            - name: VALHALLA_SERVICE_PORT
              value: "8002"
            - name: use_tiles_ignore_pbf
              value: "True"
            - name: force_rebuild
              value: "False"
            - name: build_tar
              value: "False"
            - name: build_elevation
              value: "False"
            - name: build_admins
              value: "False"
            - name: build_time_zones
              value: "False"
            - name: build_transit
              value: "False"
            - name: update_existing_config
              value: "True"
            - name: use_default_speeds_config
              value: "False"
            - name: server_threads
              value: "2"
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
