name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: mapgap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, build, audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run interaction and visual regression tests
        run: npm run test:visual

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Upload built app
        uses: actions/upload-artifact@v7
        with:
          name: mapgap-dist
          path: dist
          if-no-files-found: error

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: mapgap-playwright-report
          path: playwright-report
          if-no-files-found: ignore

  deploy-preview:
    name: Netlify preview deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download built app
        uses: actions/download-artifact@v7
        with:
          name: mapgap-dist
          path: dist

      - name: Skip preview deploy when Netlify secrets are absent
        if: env.NETLIFY_AUTH_TOKEN == '' || env.NETLIFY_SITE_ID == ''
        run: echo "Skipping Netlify preview deploy because NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID is not configured."

      - name: Deploy preview to Netlify
        if: env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        run: >
          npx --yes netlify-cli deploy
          --dir=dist
          --functions=netlify/functions
          --message="MapGap preview ${{ github.event.pull_request.head.sha }}"

  deploy-production:
    name: Netlify production deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download built app
        uses: actions/download-artifact@v7
        with:
          name: mapgap-dist
          path: dist

      - name: Skip production deploy when Netlify secrets are absent
        if: env.NETLIFY_AUTH_TOKEN == '' || env.NETLIFY_SITE_ID == ''
        run: echo "Skipping Netlify production deploy because NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID is not configured."

      - name: Deploy production to Netlify
        if: env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        run: >
          npx --yes netlify-cli deploy
          --prod
          --dir=dist
          --functions=netlify/functions
          --message="MapGap production ${{ github.sha }}"
