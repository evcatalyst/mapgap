name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: mapgap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, build, audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify V2 dependency isolation from V3
        run: npm run check:v2-isolation

      - name: Verify V2 artifact budget
        run: npm run check:v2-budget

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run interaction and visual regression tests
        run: npm run test:visual

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Upload built app
        uses: actions/upload-artifact@v7
        with:
          name: mapgap-dist
          path: dist
          if-no-files-found: error

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: mapgap-playwright-report
          path: playwright-report
          if-no-files-found: ignore

  v3-alpha:
    name: V3 direct-stack internal alpha checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/v3/package-lock.json

      - name: Install isolated V3 dependencies
        working-directory: apps/v3
        run: npm ci

      - name: Test renderer-neutral project contracts
        run: npm --prefix packages/project-contract test

      - name: Typecheck V3
        working-directory: apps/v3
        run: npm run typecheck

      - name: Build V3 alpha
        working-directory: apps/v3
        run: npm run build

      - name: Verify V3 deployment boundary
        working-directory: apps/v3
        run: npm run check:boundary

      - name: Verify V3 artifact budget
        working-directory: apps/v3
        run: npm run check:budget

      - name: Verify V3 internal-alpha audit disposition
        working-directory: apps/v3
        run: npm run audit:alpha

      - name: Install V3 Playwright browser
        working-directory: apps/v3
        run: npx playwright install --with-deps chromium

      - name: Run V3 project-contract and parity tests
        working-directory: apps/v3
        run: npm run test:contract

      - name: Run V3 analyst workflow smoke tests
        working-directory: apps/v3
        run: npm run test:smoke

      - name: Run V3 token-free style check
        working-directory: apps/v3
        run: npm run test:security

      - name: Run V3 scale-policy checks
        working-directory: apps/v3
        run: npm run test:scale

      - name: Upload V3 alpha artifact
        uses: actions/upload-artifact@v7
        with:
          name: mapgap-v3-alpha-dist
          path: apps/v3/dist
          if-no-files-found: error

      - name: Upload V3 Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: mapgap-v3-alpha-playwright-report
          path: apps/v3/playwright-report
          if-no-files-found: ignore

  deploy-preview:
    name: Netlify preview deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download built app
        uses: actions/download-artifact@v7
        with:
          name: mapgap-dist
          path: dist

      - name: Skip preview deploy when Netlify secrets are absent
        if: env.NETLIFY_AUTH_TOKEN == '' || env.NETLIFY_SITE_ID == ''
        run: echo "Skipping Netlify preview deploy because NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID is not configured."

      - name: Deploy preview to Netlify
        if: env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        run: >
          npx --yes netlify-cli deploy
          --no-build
          --dir=dist
          --functions=netlify/functions
          --message="MapGap preview ${{ github.event.pull_request.head.sha }}"

  deploy-production:
    name: Netlify production deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download built app
        uses: actions/download-artifact@v7
        with:
          name: mapgap-dist
          path: dist

      - name: Skip production deploy when Netlify secrets are absent
        if: env.NETLIFY_AUTH_TOKEN == '' || env.NETLIFY_SITE_ID == ''
        run: echo "Skipping Netlify production deploy because NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID is not configured."

      - name: Deploy production to Netlify
        if: env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        run: >
          npx --yes netlify-cli deploy
          --prod
          --no-build
          --dir=dist
          --functions=netlify/functions
          --message="MapGap production ${{ github.sha }}"
