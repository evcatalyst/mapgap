name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: mapgap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, build, audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Upload built app
        uses: actions/upload-artifact@v4
        with:
          name: mapgap-dist
          path: dist
          if-no-files-found: error

  deploy-preview:
    name: Netlify preview deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download built app
        uses: actions/download-artifact@v4
        with:
          name: mapgap-dist
          path: dist

      - name: Validate Netlify secrets
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID GitHub secrets are required for preview deploys."
            exit 1
          fi

      - name: Deploy preview to Netlify
        run: >
          npx --yes netlify-cli deploy
          --dir=dist
          --functions=netlify/functions
          --message="MapGap preview ${{ github.event.pull_request.head.sha }}"

  deploy-production:
    name: Netlify production deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download built app
        uses: actions/download-artifact@v4
        with:
          name: mapgap-dist
          path: dist

      - name: Validate Netlify secrets
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID GitHub secrets are required for production deploys."
            exit 1
          fi

      - name: Deploy production to Netlify
        run: >
          npx --yes netlify-cli deploy
          --prod
          --dir=dist
          --functions=netlify/functions
          --message="MapGap production ${{ github.sha }}"
