name: Optional Kepler research evidence

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence:
    name: Validate archived fork evidence
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate optional Kepler fork evidence
        run: npm run check:kepler-fork
